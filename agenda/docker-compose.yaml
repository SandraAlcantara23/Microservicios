services:
  ms1:
    image: node:18
    container_name: ms1
    working_dir: /app
    volumes:
      - ./ms-1:/app
    command: sh -c "npm install && npm start"
    expose:
      - "3000"
    environment:
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/ms1_db?replicaSet=rs0
    restart: unless-stopped
    networks:
      - agenda_net

  ms2:
    image: node:18
    container_name: ms2
    working_dir: /app
    volumes:
      - ./ms-2:/app
    command: sh -c "npm install && npm start"
    expose:
      - "3000"
    environment:
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/ms2_db?replicaSet=rs0
    restart: unless-stopped
    networks:
      - agenda_net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ms1
      - ms2
    restart: unless-stopped
    networks:
      - agenda_net

networks:
  agenda_net:
    external: true